{% extends 'base.html' %}
{% block title %}Enroll {{ student.name }}{% endblock %}
{% block content %}
<h2>Enroll {{ student.name }} in Subjects</h2>
<form method="POST">
    <div class="mb-3">
        {% for subject in subjects %}
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="subjects" value="{{ subject.id }}"
                   id="sub_{{ subject.id }}" {% if subject.id in enrolled_ids %}checked{% endif %}>
            <label class="form-check-label" for="sub_{{ subject.id }}">
                {{ subject.name }} ({{ subject.code }})
            </label>
        </div>
        {% endfor %}
    </div>
    <button type="submit" class="btn btn-primary">Save Enrollment</button>
    <a href="{{ url_for('students') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
